          <h2 style="color:#8B6914;">촌맵이란?</h2>
          <p>촌맵(ChonMap)은 <strong>한국식 8촌 체계 기반의 인터랙티브 가계도 앱</strong>입니다. 사람을 탭하면 모든 호칭이 해당 인물 기준으로 자동 변경됩니다. 80여 가지 한국식 호칭을 정확히 표시하며, 부계·모계·인척을 구분합니다.</p>
          <h2 style="color:#8B6914;">주요 기능</h2>
          <ul>
            <li>한국식 8촌 자동 계산 (부계·모계·인척 구분)</li>
            <li>기준 인물 변경 시 호칭 자동 재계산</li>
            <li>관계 검색 및 경로 시각화</li>
            <li>가족 템플릿 (핵가족·3대·양가)</li>
            <li>데이터는 이용자 기기에만 저장 (완전한 프라이버시)</li>
          </ul>
